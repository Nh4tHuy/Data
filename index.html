<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Tài Liệu Tà Đạo - Nh4tHuy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0f172a;
            color: #f8fafc;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gradient-text {
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-active {
            background: rgba(59, 130, 246, 0.1);
            border-right: 3px solid #3b82f6;
            color: #3b82f6;
        }

        input,
        select,
        textarea {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 1.25rem;
            border-radius: 1rem;
            outline: none;
            transition: all 0.2s;
            font-size: 1.1rem;
            width: 100%;
        }

        input:focus,
        textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
            background: rgba(15, 23, 42, 0.95);
        }

        .btn-primary {
            background: linear-gradient(16deg, #001d4b, rgb(123 162 225 / 80%));
            transition: all 0.3s;
            cursor: pointer;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script>
        window.onerror = function (message, source, lineno, colno, error) {
            console.error("Global Error Caught:", { message, source, lineno, colno, error });
            return false;
        };
    </script>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- CONFIGURATION ---
        const API_URL = "https://script.google.com/macros/s/AKfycbzYnAIe5aieIw8EYdLUKGdC0heRJYm9z6AnOf4oR5SqUkOBFMAyqSUYHoh3b-N3ToC4xQ/exec";

        // --- COMPONENTS ---

        const Icon = ({ name, className = "" }) => <i className={`${name} ${className}`}></i>;

        const LoadingOverlay = () => (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[9999] flex items-center justify-center">
                <div className="bg-slate-800 p-6 rounded-2xl flex flex-col items-center gap-4 shadow-2xl border border-white/10">
                    <div className="loader"></div>
                    <p className="text-sm font-medium">Đang xử lý, đồng bộ dữ liệu...</p>
                </div>
            </div>
        );

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
                    <motion.div
                        initial={{ opacity: 0, scale: 0.95 }}
                        animate={{ opacity: 1, scale: 1 }}
                        className="bg-slate-800 w-full max-w-lg rounded-2xl border border-white/10 shadow-2xl overflow-hidden"
                    >
                        <div className="p-4 border-b border-white/5 flex justify-between items-center bg-slate-800/50">
                            <h3 className="font-bold text-lg">{title}</h3>
                            <button onClick={onClose} className="p-2 hover:bg-white/5 rounded-lg transition-colors"><Icon name="fa-solid fa-xmark" /></button>
                        </div>
                        <div className="p-6">{children}</div>
                    </motion.div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(JSON.parse(localStorage.getItem('saas_user')) || null);
            const [view, setView] = useState('landing'); 
            const [loading, setLoading] = useState(false);
            const [files, setFiles] = useState([]);
            const [users, setUsers] = useState([]);
            const [settings, setSettings] = useState({});
            const [adminTab, setAdminTab] = useState('files'); 
            const [editingFile, setEditingFile] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [showAnnouncement, setShowAnnouncement] = useState(false);
            const [openFaq, setOpenFaq] = useState(null);
            const [faqs, setFaqs] = useState([]);
            const [editingFaq, setEditingFaq] = useState(null);
            const [showSpamPopup, setShowSpamPopup] = useState(false);

            // Notification state
            const [notification, setNotification] = useState({ show: false, message: '', type: 'success' });
            const [downloadModal, setDownloadModal] = useState({ isOpen: false, file: null, key: '' });
            const [keyError, setKeyError] = useState(false);
            const notify = (message, type = 'success') => {
                setNotification({ show: true, message, type });
                setTimeout(() => setNotification({ ...notification, show: false }), 4000);
            };

            useEffect(() => {
                checkAnnouncement();
                if (user) {
                    fetchData();
                } else {
                    fetchPublicData();
                }
            }, [user]);
            useEffect(() => {
                const handleSpamClick = (e) => {
                    if (e.target.closest('#spam')) {
                        e.preventDefault();
                        setShowSpamPopup(true);
                    }
                };
                document.addEventListener('click', handleSpamClick);
                return () => document.removeEventListener('click', handleSpamClick);
            }, []);
            const fetchPublicData = async () => {
                try {
                    const res = await callApi('fetchData');
                    if (res.success) {
                        if (Array.isArray(res.files)) setFiles(res.files);
                        if (res.settings) setSettings(res.settings);
                        if (Array.isArray(res.faqs)) setFaqs(res.faqs);
                    }
                } catch (e) { }
            };

            const fetchData = async () => {
                setLoading(true);
                try {
                    const res = await callApi('fetchData');
                    if (res.success) {
                        if (Array.isArray(res.files)) setFiles(res.files);
                        if (res.settings) setSettings(res.settings);
                        if (user?.role === 'admin' && Array.isArray(res.users)) setUsers(res.users);
                        if (Array.isArray(res.faqs)) setFaqs(res.faqs);
                    }
                } catch (e) {
                    console.error("Fetch error:", e);
                }
                setLoading(false);
            };

            const checkAnnouncement = () => {
                const lastDismissed = localStorage.getItem('announcement_dismissed');
                const now = Date.now();
                if (!lastDismissed || now - parseInt(lastDismissed) > 2 * 60 * 60 * 1000) {
                    setShowAnnouncement(true);
                }
            };

            const callApi = async (action, data = {}) => {
                const payload = JSON.stringify({ action, ...data });
                console.log(`[API Request] ${action}:`, data);

                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        mode: 'cors',
                        redirect: 'follow',
                        headers: {
                            'Content-Type': 'text/plain;charset=utf-8',
                        },
                        body: payload
                    });

                    const text = await response.text();
                    console.log(`[API Raw Response] ${action}:`, text);

                    try {
                        const result = JSON.parse(text);
                        return result;
                    } catch (parseError) {
                        console.error("[API Parse Error]:", text);
                        return { success: false, message: "Phản hồi từ máy chủ không hợp lệ (Không phải JSON)" };
                    }
                } catch (error) {
                    console.error("[API Network Error]:", error);
                    return { success: false, message: "Không thể kết nối tới máy chủ Google Apps Script" };
                }
            };

           const handleLogin = async (e) => {
    e.preventDefault();
    setLoading(true);
    const username = e.target.username.value.trim();
    const password = e.target.password.value;
    
    try {
        let res = await callApi('login', { username, password });
        
        // --- THUẬT TOÁN FIX LỖI MẤT SỐ 0 TRÊN GOOGLE SHEETS ---
        // Nếu đăng nhập thất bại, mật khẩu là số và bắt đầu bằng số 0
        if (!res.success && !isNaN(password) && password.startsWith('0')) {
            // Tự động bỏ số 0 ở đầu để khớp với dữ liệu bị Google Sheet bóp méo
            const fallbackPassword = Number(password).toString(); 
            res = await callApi('login', { username, password: fallbackPassword });
        }
        // ------------------------------------------------------

        if (res.success) {
            localStorage.setItem('saas_user', JSON.stringify(res.data));
            setUser(res.data);
            setView('landing');
            notify("Đăng nhập thành công! Chào mừng trở lại.");
        } else {
            notify(res.message || "Sai tài khoản hoặc mật khẩu", "error");
        }
    } catch (e) { 
        notify("Lỗi kết nối máy chủ. Hãy kiểm tra lại URL Apps Script.", "error"); 
    }
    setLoading(false);
};

            const handleRegister = async (e) => {
                e.preventDefault();
                setLoading(true);
                const username = e.target.username.value.trim();
                const password = e.target.password.value;

                try {
                    const res = await callApi('register', { username, password });
                    if (res.success) {
                        notify("Đăng ký thành công! Đang chuyển sang đăng nhập...");
                        setTimeout(() => {
                            setView('login');
                            setLoading(false);
                        }, 1500);
                        return;
                    } else {
                        notify(res.message || "Đăng ký thất bại", "error");
                    }
                } catch (e) {
                    notify("Lỗi hệ thống khi đăng ký", "error");
                }
                setLoading(false);
            };

            const handleUpload = async (e) => {
                e.preventDefault();
                setLoading(true);
                const formatDate = (date) => {
                    const d = new Date(date);
                    const day = String(d.getDate()).padStart(2, '0');
                    const month = String(d.getMonth() + 1).padStart(2, '0');
                    const year = d.getFullYear();
                    return `${day}/${month}/${year}`;
                };

                const data = {
                    id: editingFile ? editingFile.id : 'F' + Date.now(),
                    filename: e.target.filename.value,
                    file_url: e.target.file_url.value,
                    uploader: user.username,
                    status: editingFile ? editingFile.status : (user.role === 'admin' ? 'approved' : 'pending'),
                    download_key: e.target.download_key.value || '',
                    created_at: editingFile ? editingFile.created_at : formatDate(new Date()),
                    download_count: editingFile ? editingFile.download_count : 0,
                    note: e.target.note.value
                };
                try {
                    const action = editingFile ? 'updateFile' : 'uploadFile';
                    const res = await callApi(action, { data });
                    if (res.success) {
                        if (user.role === 'admin' && !editingFile) {
                            notify("Vui lòng chờ giây lát...");
                        } else {
                            notify(editingFile ? "Đã cập nhật thông tin File!" : "Đã gửi File! Chờ Admin duyệt.");
                        }
                        e.target.reset();
                        setEditingFile(null);
                        fetchData();
                        if (user.role !== 'admin') setAdminTab('upload');
                        else setAdminTab('admin_panel');
                    } else {
                        notify(res.message || "Thao tác thất bại", "error");
                    }
                } catch (e) { notify("Lỗi hệ thống", "error"); }
                setLoading(false);
            };

            const handleAction = async (action, id, extra = {}) => {
                setLoading(true);
                try {
                    const res = await callApi(action, { id, ...extra });
                    if (res.success) fetchData();
                } catch (e) { notify("Thao tác thất bại", "error"); }
                setLoading(false);
            };

            const executeDownload = (file) => {
                if (!file || !file.file_url) {
                    notify("Lỗi: File này không có đường dẫn tải!", "error");
                    return;
                }
                const linkObj = document.createElement('a');
                linkObj.href = file.file_url;
                linkObj.target = '_blank'; 
                linkObj.rel = 'noopener noreferrer';
                document.body.appendChild(linkObj);
                linkObj.click(); 
                document.body.removeChild(linkObj);

                handleAction('incrementDownload', file.id);
            };

            const handleDownload = (file) => {
                if (file.download_key) {
                    setDownloadModal({ isOpen: true, file: file, key: '' });
                } else {
                    executeDownload(file);
                }
            };

            const submitDownloadKey = (e) => {
                e.preventDefault();
                const inputKey = String(downloadModal.key).trim();
                const correctKey = String(downloadModal.file.download_key).trim();

                if (inputKey === correctKey) {
                    setKeyError(false); 
                    setDownloadModal({ isOpen: false, file: null, key: '' });
                    executeDownload(downloadModal.file); 
                } else {
                    setKeyError(true); 
                }
            };
            const logout = () => {
                localStorage.removeItem('saas_user');
                setUser(null);
                setView('landing');
            };
            const renderDownloadModal = () => {
                if (!downloadModal.isOpen) return null;
                return (
                    <div className="fixed inset-0 z-[99999] flex items-center justify-center p-4 bg-black/80 backdrop-blur-md">
                        <div className="glass w-full max-w-sm rounded-3xl border border-white/10 shadow-2xl overflow-hidden relative text-center p-8 animate-fade-in">
                            <button onClick={() => setDownloadModal({ isOpen: false, file: null, key: '' })} className="absolute top-4 right-4 text-slate-400 hover:text-white p-2 transition-colors">
                                <Icon name="fa-solid fa-xmark" />
                            </button>
                            <div className="w-16 h-16 bg-blue-500/20 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-blue-500/30 text-blue-400 text-3xl shadow-[0_0_15px_rgba(59,130,246,0.2)]">
                                <Icon name="fa-solid fa-lock" />
                            </div>
                            <h3 className="text-xl font-bold text-white mb-2">Tài liệu được bảo mật</h3>
                            <p className="text-slate-400 text-sm mb-6">Nhập Key để lấy Link của File:<br /><strong className="text-white">{downloadModal.file?.filename}</strong></p>
                            <form onSubmit={submitDownloadKey} className="flex flex-col gap-4">
                                {/* Dòng chữ đỏ báo lỗi sẽ hiện ở đây nếu nhập sai */}
                                {keyError && (
                                    <p className="text-red-400 text-sm font-bold bg-red-500/10 p-3 rounded-lg border border-red-500/20 animate-pulse">
                                        Key không chính xác, vui lòng né hộ!
                                    </p>
                                )}

                                <input
                                    type="text"
                                    required
                                    value={downloadModal.key}
                                    onChange={(e) => {
                                        setDownloadModal({ ...downloadModal, key: e.target.value });
                                        setKeyError(false); 
                                    }}
                                    placeholder="Nhập Key..."
                                    className="w-full text-center tracking-widest font-mono text-xl py-4"
                                    autoFocus
                                />
                                <button type="submit" className="w-full py-4 btn-primary rounded-xl font-bold text-lg shadow-lg shadow-blue-500/20 flex justify-center items-center gap-2">
                                    <Icon name="fa-solid fa-unlock-keyhole" /> Xác nhận
                                </button>
                            </form>
                        </div>
                    </div>
                );
            };
            // --- RENDER HELPERS ---

            const filteredFiles = useMemo(() => {
                const query = (searchQuery || '').toLowerCase();
                return files.filter(f => {
                    const filename = String(f.filename || '').toLowerCase();
                    const uploader = String(f.uploader || '').toLowerCase();
                    const note = String(f.note || '').toLowerCase();
                    return filename.includes(query) || uploader.includes(query) || note.includes(query);
                });
            }, [files, searchQuery]);

            const renderSpamPopup = () => {
                if (!showSpamPopup) return null;
                return (
                    <div className="fixed inset-0 z-[10000] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
                        <div className="bg-slate-800 border-2 border-red-500 p-8 rounded-2xl shadow-[0_0_30px_rgba(239,68,68,0.3)] w-full max-w-sm relative text-center">
                            <div className="bg-red-500/20 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 border border-red-500/50">
                                <Icon name="fa-solid fa-triangle-exclamation" className="text-red-500 text-4xl animate-pulse" />
                            </div>
                            <h2 className="text-2xl font-bold text-red-500 mb-2">Cảnh Báo!</h2>
                            <p className="text-slate-300 text-lg">Nút này không có chức năng. <br/>Nhấp vô làm gì thế...</p>
                            <br />
                            <button onClick={() => setShowSpamPopup(false)} className="px-8 py-4 glass rounded-xl font-bold text-lg hover:bg-white/5 transform hover:-translate-y-1 transition-all">
                                Né hộ
                            </button>
                        </div>
                    </div>
                );
            };

            if (view === 'landing') {
                return (
                    <div className="min-h-screen selection:bg-blue-500/30 relative flex flex-col">
                        {/* TOAST NOTIFICATION */}
                        <AnimatePresence>
                            {notification.show && (
                                <motion.div
                                    initial={{ opacity: 0, y: -20, x: '-50%' }}
                                    animate={{ opacity: 1, y: 20, x: '-50%' }}
                                    exit={{ opacity: 0, y: -20, x: '-50%' }}
                                    className={`fixed top-0 left-1/2 z-[10000] px-6 py-3 rounded-xl shadow-2xl border flex items-center gap-3 font-bold min-w-[300px] ${notification.type === 'success'
                                            ? 'bg-emerald-500/90 border-emerald-400 text-white'
                                            : 'bg-red-500/90 border-red-400 text-white'
                                        }`}
                                >
                                    <Icon name={notification.type === 'success' ? "fa-solid fa-circle-check" : "fa-solid fa-circle-exclamation"} />
                                    <span>{notification.message}</span>
                                </motion.div>
                            )}
                        </AnimatePresence>

                        <nav className="p-4 md:p-6 flex justify-between items-center max-w-7xl mx-auto w-full sticky top-0 z-50 glass rounded-b-2xl">
                            
                            <div className="text-xl md:text-2xl font-bold gradient-text flex items-center gap-2 cursor-pointer whitespace-nowrap" onClick={() => setView('landing')}>
                                <Icon name="fa-solid fa-book-open" className="text-blue-400" />
                                <span className="hidden sm:inline">KHO TÀI LIỆU TÀ ĐẠO</span>
                                <span className="sm:hidden text-lg">TÀ ĐẠO</span>
                            </div>
                            <div className="flex items-center gap-2 md:gap-4">
                                {user ? (
                                    <>
                                        {/* Nút Tải lên (Icon trên mobile, có chữ trên PC) */}
                                        <button onClick={() => { setView('dashboard'); setAdminTab('upload'); }} className="flex items-center gap-2 px-3 py-2 md:px-5 md:py-2.5 bg-emerald-500/10 text-emerald-400 hover:bg-emerald-500 hover:text-white rounded-xl font-bold transition-all" title="Tải lên file">
                                            <Icon name="fa-solid fa-cloud-arrow-up" />
                                            <span className="hidden md:inline">Tải lên</span>
                                        </button>

                                        {/* Nút Quản trị cho Admin (Icon trên mobile, có chữ trên PC) */}
                                        {user.role === 'admin' && (
                                            <button onClick={() => { setAdminTab('admin_panel'); setView('dashboard'); }} className="px-3 py-2 md:px-5 md:py-2.5 bg-blue-600 text-white hover:bg-blue-500 rounded-xl font-bold transition-all shadow-lg shadow-blue-500/20 flex items-center gap-2" title="Quản trị">
                                                <Icon name="fa-solid fa-user-shield" />
                                                <span className="hidden md:inline">Quản trị</span>
                                            </button>
                                        )}

                                        <div className="h-6 md:h-8 w-[1px] bg-white/10 mx-1 md:mx-2"></div>

                                        {/* Khu vực User (Icon + Tên rút gọn trên mobile) */}
                                        <div className="flex items-center gap-2 md:gap-3 px-2 py-1 md:px-3 md:py-1.5 glass rounded-full">
                                            <div className="w-7 h-7 md:w-8 md:h-8 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-400 font-bold text-xs">
                                                {(user.username || 'U')[0].toUpperCase()}
                                            </div>
                                            <span className="text-sm font-bold hidden sm:inline truncate max-w-[80px] md:max-w-none">{user.username}</span>
                                            <button onClick={logout} className="p-1.5 md:p-2 hover:text-red-400 transition-colors" title="Đăng xuất">
                                                <Icon name="fa-solid fa-right-from-bracket" />
                                            </button>
                                        </div>
                                    </>
                                ) : (
                                    <>
                                        {/* Nút Đăng nhập (Icon trên mobile, có chữ trên PC) */}
                                        <button onClick={() => setView('login')} className="px-3 py-2 md:px-5 hover:text-blue-400 transition-colors font-bold flex items-center gap-2" title="Đăng nhập">
                                            <Icon name="fa-solid fa-right-to-bracket" className="md:hidden text-lg" />
                                            <span className="hidden md:inline">Đăng nhập</span>
                                        </button>

                                        {/* Nút Đăng ký (Icon trên mobile, có chữ trên PC) */}
                                        <button onClick={() => setView('register')} className="px-4 py-2 md:px-6 btn-primary rounded-full font-bold shadow-lg shadow-blue-500/20 flex items-center gap-2" title="Bắt đầu ngay">
                                            <Icon name="fa-solid fa-user-plus" className="md:hidden" />
                                            <span className="hidden md:inline">Đăng ký</span>
                                        </button>
                                    </>
                                )}
                            </div>
                        </nav>
                        {/* HERO SECTION */}
                        <main className="flex-grow">
                            <section className="flex flex-col items-center justify-center text-center px-4 py-12 md:py-24 mt-4 md:mt-0 w-full overflow-hidden">
                                <motion.div
                                    initial={{ opacity: 0, y: 20 }}
                                    animate={{ opacity: 1, y: 0 }}
                                    className="inline-flex items-center justify-center px-4 py-1.5 mb-6 text-sm font-semibold text-blue-400 bg-blue-500/10 border border-blue-500/20 rounded-full"
                                >
                                    <span className="flex w-2 h-2 bg-blue-500 rounded-full mr-2 animate-pulse shadow-[0_0_8px_rgba(59,130,246,0.8)]"></span>
                                    Hệ thống lấy link tài liệu trực tuyến
                                </motion.div>
                                <motion.h1
                                    initial={{ opacity: 0, y: 20 }}
                                    animate={{ opacity: 1, y: 0 }}
                                    transition={{ delay: 0.1 }}
                                    className="text-4xl md:text-6xl font-extrabold text-white mb-6 tracking-tight leading-tight">

                                                                    <button onClick={() => window.open(file.file_url, '_blank')} className="w-10 h-10 rounded-lg bg-blue-500/10 text-blue-500 hover:bg-blue-500 hover:text-white transition-all"><Icon name="fa-solid fa-eye" /></button>
                                                                </td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </section>
                                    )}

                                    {/* 3. QUẢN LÝ USER */}
                                    <section>
                                        <h2 className="text-2xl font-bold mb-6 flex items-center gap-3"><Icon name="fa-solid fa-users-gear text-emerald-400" /> Quản lý người dùng</h2>
                                        <div className="glass rounded-3xl overflow-hidden shadow-xl">
                                            <table className="w-full text-left border-collapse">
                                                <thead className="bg-white/5 text-slate-400 text-xs uppercase tracking-widest">
                                                    <tr>
                                                        <th className="p-6 w-16">STT</th>
                                                        <th className="p-6">Tài khoản</th>
                                                        <th className="p-6">Số File đăng</th>
                                                        <th className="p-6">Cấp độ</th>
                                                        <th className="p-6">Trạng thái</th>
                                                        <th className="p-6 text-right">Thao tác</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-white/5">
                                                    {users.map((u, index) => (
                                                        <tr key={u.id} className="hover:bg-white/5 transition-colors">
                                                            <td className="p-6 text-slate-500 font-mono text-xs">{index + 1}</td>
                                                            <td className="p-6 font-bold text-slate-200">{u.username}</td>
                                                            <td className="p-6"><span className="px-3 py-1 bg-slate-800 rounded-lg text-blue-400 font-bold text-xs">{files.filter(f => f.uploader === u.username).length} File</span></td>
                                                            <td className="p-6"><span className={`px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter ${u.role === 'admin' ? 'bg-purple-500/20 text-purple-400' : 'bg-blue-500/20 text-blue-400'}`}>{u.role === 'admin' ? 'Quản trị viên' : 'Thành viên'}</span></td>
                                                            <td className="p-6"><span className={`px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter ${u.status === 'active' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400'}`}>{u.status === 'active' ? 'Hoạt động' : 'Bị khóa'}</span></td>
                                                            <td className="p-6 text-right">
                                                                {u.username !== user.username && (
                                                                    <button onClick={() => handleAction('banUser', u.id, { status: u.status === 'active' ? 'banned' : 'active' })} className={`px-4 py-2 rounded-xl font-bold text-xs transition-all ${u.status === 'active' ? 'bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white' : 'bg-emerald-500/10 text-emerald-400 hover:bg-emerald-500 hover:text-white'}`}>{u.status === 'active' ? 'Khóa tài khoản' : 'Mở khóa'}</button>
                                                                )}
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </section>

                                    {/* 4. TOÀN BỘ FILE */}
                                    <section>
                                        <h2 className="text-2xl font-bold mb-6 flex items-center gap-3"><Icon name="fa-solid fa-list-check text-blue-400" /> Danh sách File hệ thống</h2>
                                        <div className="glass rounded-3xl overflow-hidden shadow-xl">
                                            <div className="overflow-x-auto">
                                                <table className="w-full text-left border-collapse">
                                                    <thead className="bg-white/5 text-slate-400 text-xs uppercase tracking-widest">
                                                        <tr>
                                                            <th className="p-6">Tên File</th>
                                                            <th className="p-6">Người đăng</th>
                                                            <th className="p-6">Link</th>
                                                            <th className="p-6">Key</th>
                                                            <th className="p-6">Trạng thái</th>
                                                            <th className="p-6 text-right">Thao tác</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-white/5">
                                                        {filteredFiles.map(file => (
                                                            <tr key={file.id} className="hover:bg-white/5 transition-colors group">
                                                                <td className="p-6"><div className="font-bold text-slate-200">{file.filename}</div><div className="text-[10px] text-slate-500 mt-1">{file.id}</div></td>
                                                                <td className="p-6 text-slate-400 text-sm">{file.uploader}</td>
                                                                <td className="p-6"><button onClick={() => window.open(file.file_url, '_blank')} className="text-blue-400 hover:text-blue-300 flex items-center gap-2 text-sm font-medium"><Icon name="fa-solid fa-link" /> Xem</button></td>
                                                                <td className="p-6"><span className="text-xs font-mono text-slate-400 bg-slate-800 px-2 py-1 rounded border border-white/5">{file.download_key || 'Không'}</span></td>
                                                                <td className="p-6"><span className={`px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter ${file.status === 'approved' ? 'bg-emerald-500/20 text-emerald-400' : file.status === 'rejected' ? 'bg-red-500/20 text-red-400' : 'bg-amber-500/20 text-amber-400'}`}>{file.status === 'approved' ? 'Đã duyệt' : file.status === 'rejected' ? 'Từ chối' : 'Chờ duyệt'}</span></td>
                                                                <td className="p-6 text-right flex justify-end gap-2">
                                                                    <button onClick={() => { setEditingFile(file); setAdminTab('upload'); window.scrollTo({ top: 0, behavior: 'smooth' }); }} className="p-2 bg-blue-500/10 text-blue-400 hover:bg-blue-500 hover:text-white rounded-lg transition-all" title="Sửa"><Icon name="fa-solid fa-pen" /></button>
                                                                    <button onClick={() => handleAction(file.status === 'approved' ? 'rejectFile' : 'approveFile', file.id)} className={`p-2 rounded-lg transition-all ${file.status === 'approved' ? 'bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white' : 'bg-emerald-500/10 text-emerald-400 hover:bg-emerald-500 hover:text-white'}`} title={file.status === 'approved' ? 'Hủy duyệt' : 'Duyệt'}><Icon name={file.status === 'approved' ? "fa-solid fa-xmark" : "fa-solid fa-check"} /></button>
                                                                </td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </section>

                                    {/* 5. QUẢN LÝ FAQ */}
                                    <section hidden>
                                        <h2 className="text-2xl font-bold mb-6 flex items-center gap-3"><Icon name="fa-solid fa-circle-question text-purple-400" /> Quản lý FAQ</h2>
                                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-10">
                                            <div className="glass p-8 rounded-3xl h-fit">
                                                <h3 className="text-xl font-bold mb-6 flex items-center gap-3">{editingFaq ? 'Sửa câu hỏi' : 'Thêm câu hỏi mới'}</h3>
                                                <form onSubmit={(e) => {
                                                    e.preventDefault();
                                                    const question = e.target.question.value;
                                                    const answer = e.target.answer.value;
                                                    if (!question || !answer) return notify("Vui lòng nhập đầy đủ!", "error");
                                                    handleAction(editingFaq ? 'updateFaq' : 'addFaq', editingFaq?.id, { question, answer });
                                                    e.target.reset();
                                                    setEditingFaq(null);
                                                    notify("Đã lưu câu hỏi thành công!");
                                                }} className="flex flex-col gap-6">
                                                    <div className="flex flex-col gap-2"><label className="text-sm font-medium text-slate-400">Câu hỏi</label><input name="question" defaultValue={editingFaq?.question || ''} className="w-full" /></div>
                                                    <div className="flex flex-col gap-2"><label className="text-sm font-medium text-slate-400">Câu trả lời</label><textarea name="answer" rows="4" defaultValue={editingFaq?.answer || ''}></textarea></div>
                                                    <div className="flex gap-4">
                                                        <button type="submit" className="btn-primary flex-grow py-3 rounded-xl font-bold">{editingFaq ? 'Cập nhật' : 'Thêm mới'}</button>
                                                        {editingFaq && <button type="button" onClick={() => setEditingFaq(null)} className="px-6 py-3 glass rounded-xl font-bold text-sm">Hủy</button>}
                                                    </div>
                                                </form>
                                            </div>
                                            <div className="lg:col-span-2 flex flex-col gap-4">
                                                {faqs.map(faq => (
                                                    <div key={faq.id} className="p-6 glass rounded-2xl flex flex-col gap-4">
                                                        <div className="flex justify-between items-start gap-4">
                                                            <div className="font-bold text-blue-400">Q: {faq.question}</div>
                                                            <div className="flex gap-2">
                                                                <button onClick={() => setEditingFaq(faq)} className="p-2 bg-blue-500/10 text-blue-400 hover:bg-blue-500 hover:text-white rounded-lg transition-all"><Icon name="fa-solid fa-pen" /></button>
                                                                <button onClick={() => handleAction('deleteFaq', faq.id)} className="p-2 bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white rounded-lg transition-all"><Icon name="fa-solid fa-trash" /></button>
                                                            </div>
                                                        </div>
                                                        <div className="text-slate-400 text-sm">A: {faq.answer}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </section>

                                    {/* 6. CÀI ĐẶT HỆ THỐNG */}
                                    <section hidden>
                                        <h2 className="text-2xl font-bold mb-6 flex items-center gap-3"><Icon name="fa-solid fa-sliders text-slate-400" /> Cài đặt hệ thống</h2>
                                        <div className="glass p-10 rounded-3xl max-w-2xl">
                                            <h3 className="text-xl font-bold mb-8 flex items-center gap-3"><Icon name="fa-solid fa-bullhorn text-blue-400" /> Thông báo Popup toàn web</h3>
                                            <form onSubmit={(e) => {
                                                e.preventDefault();
                                                handleAction('updateAnnouncement', null, { text: e.target.announcement.value, enabled: e.target.enabled.checked });
                                                notify("Đã cập nhật cấu hình hệ thống!");
                                            }} className="flex flex-col gap-6">
                                                <div className="flex flex-col gap-2"><label className="text-sm font-medium text-slate-400">Nội dung thông báo</label><textarea name="announcement" rows="4" defaultValue={settings.announcement}></textarea></div>
                                                <div className="flex items-center gap-4 p-4 glass rounded-xl"><input type="checkbox" name="enabled" id="enabled" defaultChecked={settings.announcement_enabled === 'true'} className="w-5 h-5" /><label htmlFor="enabled" className="font-bold cursor-pointer">Kích hoạt thông báo Popup</label></div>
                                                <button type="submit" className="btn-primary py-4 rounded-xl font-bold">Lưu cấu hình</button>
                                            </form>
                                        </div>
                                    </section>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>

                    {/* ANNOUNCEMENT MODAL */}
                    <Modal
                        isOpen={showAnnouncement && settings.announcement_enabled === 'true'}
                        onClose={() => setShowAnnouncement(false)}
                        title="Thông báo hệ thống"
                    >
                        <div className="flex flex-col gap-6">
                            <div className="p-4 bg-blue-500/10 border border-blue-500/20 rounded-xl text-blue-200 leading-relaxed">
                                {settings.announcement}
                            </div>
                            <div className="flex gap-4">
                                <button onClick={() => setShowAnnouncement(false)} className="flex-grow py-3 btn-primary rounded-xl font-bold">Đã hiểu</button>
                                <button onClick={() => {
                                    localStorage.setItem('announcement_dismissed', Date.now().toString());
                                    setShowAnnouncement(false);
                                }} className="px-6 py-3 glass rounded-xl text-sm font-medium">Không hiện lại trong 2h</button>
                            </div>
                        </div>
                    </Modal>
                    {renderDownloadModal()}
                    {loading && <LoadingOverlay />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <!-- Popup Overlay -->
    <div id="popup-overlay"
        class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <!-- Popup Box -->
        <div
            class="glass border-2 border-green-500 p-8 rounded-2xl shadow-[0_0_30px_rgba(59,246,142,0.3)] w-full max-w-sm relative text-center">
            <div class="text-center">
                <div
                    class="bg-green-500/20 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 border border-green-500/50">
                    <i class="fa-solid fa-bolt "></i>
                </div>
                <h2 class="text-2xl font-bold text-green-500 mb-2">Chào mừng bạn!</h2>
                <p class="text-slate-300 mb-8">Đây là website lùa gà<br/> Vui lòng không nhấp tải xuống File.</p>

                <button onclick="closePopup()"
                    class="px-8 py-4 glass rounded-xl font-bold text-lg hover:bg-white/5 transform hover:-translate-y-1 transition-all">
                    Né hộ, có gà mới tin
                </button>
            </div>
        </div>
    </div>

    <script>
        const COOKIE_NAME = 'user_session_active';
        const EXPIRE_SECONDS = 3000; 
        const overlay = document.getElementById('popup-overlay');

        function getCookie(name) {
            let matches = document.cookie.match(new RegExp("(?:^|; )" + name.replace(/([\.$?*|{}\(\)\[\]\\\/\+^])/g, '\\$1') + "=([^;]*)"));
            return matches ? decodeURIComponent(matches[1]) : undefined;
        }

        function setSessionCookie() {
            const date = new Date();
            date.setTime(date.getTime() + (EXPIRE_SECONDS * 1000));
            document.cookie = `${COOKIE_NAME}=true; expires=${date.toUTCString()}; path=/`;
        }

        function closePopup() {
            overlay.classList.add('opacity-0');
            overlay.querySelector('div').classList.add('scale-95');
            setTimeout(() => {
                overlay.classList.add('hidden');
                setSessionCookie(); 
            }, 300);
        }

        window.addEventListener('load', () => {
            if (!getCookie(COOKIE_NAME)) {
                overlay.classList.remove('hidden');
                setTimeout(() => {
                    overlay.classList.remove('opacity-0');
                    overlay.querySelector('div').classList.remove('scale-95');
                }, 10);
            } else {
                setSessionCookie();
            }
        });

        ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart'].forEach(event => {
            window.addEventListener(event, () => {
                if (getCookie(COOKIE_NAME)) {
                    setSessionCookie();
                }
            });
        });
    </script>


</body>

</html>
